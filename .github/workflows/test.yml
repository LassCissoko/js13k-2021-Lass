name: Run tests Workflows

on: push

jobs: 
  runs-on: ubuntu-latest

steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Tests via Annotations
        run: npx mocha --require ./setup.js --reporter mocha-github-actions-reporter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Optionnel, aide parfois le reporter

      - name: Créer le résumé des tests
        if: always() # TRÈS IMPORTANT : pour que le résumé s'affiche même si les tests ratent
        run: |
          echo "## 📊 Rapport de Tests Lassana" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Statut | Type de Test |" >> $GITHUB_STEP_SUMMARY
          echo "|:------:|:------------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ | Tests Unitaires Mathématiques |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ | Tests Fonctionnels Logique Jeu |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Rapport généré automatiquement par la CI le $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Audit des dépendances
        run: npm audit --audit-level=critical